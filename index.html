<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>谜屿专属の夏夜生日星空祝福</title>
<style>
:root{--bg:#060817;--text:#fff8ec;--muted:rgba(255,248,236,.7);--gold:#ffd98a;--cyan:#8eeaff;--pink:#ff9acb;--line:rgba(255,255,255,.16)}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:#060817;overflow-x:hidden}
body{
  background:
    radial-gradient(circle at 18% 10%,rgba(255,154,203,.24),transparent 30%),
    radial-gradient(circle at 84% 18%,rgba(142,234,255,.18),transparent 32%),
    linear-gradient(180deg,#060817,#101a30 58%,#06111e);
}
body:before{
  content:"";position:fixed;inset:0;
  background-image:radial-gradient(#fff 1px,transparent 1px);
  background-size:42px 42px;opacity:.16;pointer-events:none;
}
.app{position:relative;z-index:1;min-height:100vh;padding:30px 16px 120px}
.hero{text-align:center;margin:0 auto 22px;max-width:780px}
.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:7px 14px;color:var(--gold);background:rgba(255,255,255,.06);font-size:13px}
h1{font-size:clamp(34px,7vw,66px);margin:16px 0 8px;letter-spacing:.04em}
.subtitle{margin:0;color:var(--muted);font-size:clamp(15px,3.7vw,20px);line-height:1.7}
.stats{margin-top:14px;color:var(--gold);font-size:14px}

.map{
  position:relative;width:min(1120px,100%);height:min(68vh,630px);min-height:470px;
  margin:24px auto 0;border:1px solid var(--line);border-radius:34px;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
  box-shadow:0 26px 80px rgba(0,0,0,.38);overflow:hidden;
}
.map:before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 56% 48%,rgba(255,217,138,.13),transparent 23%),
    radial-gradient(circle at 42% 62%,rgba(142,234,255,.11),transparent 28%);
}
.map:after{
  content:"";position:absolute;inset:0;
  background-image:
    radial-gradient(rgba(255,255,255,.45) 1px,transparent 1px),
    radial-gradient(rgba(255,217,138,.28) 1px,transparent 1px);
  background-size:80px 80px,130px 130px;
  opacity:.28;pointer-events:none;
}

.city{
  position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);
  border:0;background:transparent;color:var(--text);cursor:pointer;padding:0;text-align:center;z-index:2;
  opacity:.82;
}
.city:nth-child(3n){opacity:1}
.city:nth-child(4n){opacity:.68}
.dot{
  width:18px;height:18px;margin:auto;border-radius:50%;
  background:radial-gradient(circle,#fffef8 0%,#ffe8a3 35%,#ffd98a 70%,#ffc85d 100%);
  box-shadow:0 0 0 8px rgba(255,217,138,.13),0 0 34px rgba(255,217,138,.95);
  animation:twinkle 2.6s ease-in-out infinite;
}
.city:nth-child(2n) .dot{width:14px;height:14px}
.city:nth-child(5n) .dot{width:22px;height:22px}
.city-name{
  margin-top:9px;font-size:12px;font-weight:500;letter-spacing:.05em;white-space:nowrap;
  text-shadow:0 2px 10px rgba(0,0,0,.85);
}
.city small{display:none;color:var(--muted);font-size:11px;margin-top:2px}
.city:hover small,.city.active small{display:block}
.city:hover .dot,.city.active .dot{transform:scale(1.35)}
.city.collected .dot{
  background:#fff;
  box-shadow:0 0 0 9px rgba(142,234,255,.12),0 0 18px #fff,0 0 42px rgba(255,255,255,.7);
}
.city.collected .city-name:before{content:"⭐ "}
@keyframes twinkle{
  0%{opacity:.58;transform:scale(.96)}
  50%{opacity:1;transform:scale(1.1)}
  100%{opacity:.72;transform:scale(.98)}
}

.tip{position:absolute;left:22px;bottom:22px;color:var(--muted);font-size:14px;z-index:2}
.progress{position:absolute;right:22px;bottom:22px;color:var(--gold);font-size:14px;z-index:2}

.drawer{
  position:fixed;z-index:10;left:50%;bottom:16px;transform:translate(-50%,120%);
  width:min(780px,calc(100% - 28px));max-height:76vh;overflow:auto;padding:22px;
  border:1px solid var(--line);border-radius:28px;background:rgba(13,17,34,.9);
  backdrop-filter:blur(18px);box-shadow:0 30px 90px rgba(0,0,0,.58);transition:.35s ease;
}
.drawer.show{transform:translate(-50%,0)}
.drawer-head{display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);padding-bottom:14px}
.drawer h2{margin:0;font-size:24px}
.drawer p{margin:6px 0 0;color:var(--muted);line-height:1.6}
.close{width:36px;height:36px;border-radius:50%;border:0;background:rgba(255,255,255,.09);color:var(--text);font-size:20px;cursor:pointer}
.fans{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-top:16px}
.fan{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.06);padding:14px;text-align:left;color:var(--text);cursor:pointer}
.fan:hover{border-color:rgba(255,217,138,.55);background:rgba(255,217,138,.08)}
.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,217,138,.32),rgba(255,154,203,.22));margin-bottom:9px}
.letter{display:none;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
.letter.show{display:block}
.message{font-size:16px;line-height:1.95;white-space:pre-wrap}
.back{margin-top:14px;border:0;background:transparent;color:var(--cyan);cursor:pointer}
.ending{display:none;text-align:center;padding:18px;border-top:1px solid var(--line);margin-top:14px;color:var(--gold);line-height:1.8}
.ending.show{display:block}

@media(max-width:640px){
  .app{padding:22px 12px 115px}
  .map{height:64vh;min-height:500px;border-radius:26px}
  .tip{font-size:12px;left:16px;bottom:18px}
  .progress{font-size:12px;right:16px;bottom:18px}
  .city-name{font-size:12px}
  .city small{font-size:10px}
  .drawer{padding:18px}
}
</style>
</head>

<body>
<main class="app">
  <section class="hero">
    <div class="badge">2026 谜屿生日惊喜企划</div>
    <h1>来自世界的回响</h1>
    <p class="subtitle">这些来自不同地方的祝福，连成了只属于你的生日星空。<br>点亮每一颗星，慢慢打开家人们寄来的心意。</p>
    <div class="stats" id="stats">祝福载入中...</div>
  </section>

  <section class="map">
    <div id="cities"></div>
    <div class="tip">✨ 点亮一颗星，收下来自远方的生日祝福。</div>
    <div class="progress" id="progress">已点亮 0 / 0</div>
  </section>
</main>

<section class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <h2 id="drawerTitle"></h2>
      <p id="drawerDesc"></p>
    </div>
    <button class="close" onclick="closeDrawer()">×</button>
  </div>

  <div class="fans" id="fans"></div>

  <div class="letter" id="letter">
    <h3 id="fanName"></h3>
    <div class="message" id="fanMessage"></div>
    <button class="back" onclick="backToFans()">← 返回名单</button>
  </div>

  <div class="ending" id="ending">
    谢谢每一位家人。<br>
    因为你们，这个夏夜变得更加温暖。<br>
    <strong>生日快乐，谜屿。</strong>
  </div>
</section>

<script>
let wishes=[],currentCity=null,collected=new Set();

const $=id=>document.getElementById(id),
citiesEl=$("cities"),
drawer=$("drawer"),
drawerTitle=$("drawerTitle"),
drawerDesc=$("drawerDesc"),
fansEl=$("fans"),
letter=$("letter"),
fanName=$("fanName"),
fanMessage=$("fanMessage"),
stats=$("stats"),
ending=$("ending"),
progress=$("progress");

const starLayout = {
  "齐齐哈尔": ["71%","18%"],
  "延边": ["77%","24%"],
  "沈阳": ["68%","33%"],

  "南京": ["64%","46%"],
  "上海": ["69%","50%"],
  "湖州": ["66%","54%"],

  "张家界": ["54%","56%"],
  "长沙": ["58%","51%"],
  "曲靖": ["49%","60%"],

  "深圳": ["63%","64%"],
  "海口": ["60%","71%"],

  "台北": ["77%","54%"],
  "台湾": ["74%","61%"],
  "台南": ["79%","67%"]
};

fetch("./data/wishes.json")
  .then(r=>r.json())
  .then(d=>{
    wishes=d.cities||[];
    applyStarLayout();
    renderCities();
    updateStats();
    updateProgress();
  })
  .catch(()=>{
    stats.textContent="资料载入失败，请检查 data/wishes.json";
  });

function applyStarLayout(){
  wishes.forEach(city=>{
    if(starLayout[city.name]){
      city.x=starLayout[city.name][0];
      city.y=starLayout[city.name][1];
    }
  });
}

function totalFans(){
  return wishes.reduce((s,c)=>s+c.fans.length,0);
}

function updateStats(){
  stats.textContent=`来自 ${wishes.length} 个地方，${totalFans()} 份生日祝福`;
}

function updateProgress(){
  progress.textContent=`已点亮 ${collected.size} / ${wishes.length}`;
  if(collected.size===wishes.length && wishes.length>0){
    progress.textContent="✨ 所有祝福都已收下";
  }
}

function renderCities(){
  citiesEl.innerHTML="";
  wishes.forEach((city,i)=>{
    const btn=document.createElement("button");
    btn.className="city";
    btn.style.setProperty("--x",city.x);
    btn.style.setProperty("--y",city.y);
    btn.innerHTML=`
      <div class="dot"></div>
      <div class="city-name">${city.name}<small>${city.fans.length} 份祝福</small></div>
    `;
    btn.onclick=()=>openCity(i);
    citiesEl.appendChild(btn);
  });
}

function openCity(i){
  currentCity=wishes[i];
  collected.add(currentCity.name);

  document.querySelectorAll(".city").forEach((c,idx)=>{
    c.classList.toggle("active",idx===i);
    if(collected.has(wishes[idx].name)) c.classList.add("collected");
  });

  drawerTitle.textContent="⭐ "+currentCity.name;
  drawerDesc.textContent=`来自 ${currentCity.name} 的 ${currentCity.fans.length} 份祝福`;
  fansEl.style.display="grid";
  letter.classList.remove("show");
  ending.classList.toggle("show",collected.size===wishes.length);

  fansEl.innerHTML="";
  currentCity.fans.forEach((fan,idx)=>{
    const b=document.createElement("button");
    b.className="fan";
    b.innerHTML=`
      <div class="avatar">${fan.icon||"💌"}</div>
      <strong>${fan.name}</strong>
      <p>点击打开祝福</p>
    `;
    b.onclick=()=>openFan(idx);
    fansEl.appendChild(b);
  });

  updateProgress();
  drawer.classList.add("show");
}

function openFan(i){
  const fan=currentCity.fans[i];
  fansEl.style.display="none";
  fanName.textContent=`${fan.icon||"💌"} ${fan.name}`;
  fanMessage.textContent=fan.message;
  letter.classList.add("show");
}

function backToFans(){
  letter.classList.remove("show");
  fansEl.style.display="grid";
}

function closeDrawer(){
  drawer.classList.remove("show");
  document.querySelectorAll(".city").forEach(c=>c.classList.remove("active"));
}
</script>
</body>
</html>
