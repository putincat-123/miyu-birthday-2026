<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>谜屿生日礼物｜来自世界的回响</title>
<style>
:root{
  --bg:#060817;--text:#fff8ec;--muted:rgba(255,248,236,.7);
  --gold:#ffd98a;--cyan:#8eeaff;--pink:#ff9acb;--line:rgba(255,255,255,.16);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 20% 10%,rgba(255,154,203,.22),transparent 28%),radial-gradient(circle at 80% 20%,rgba(142,234,255,.18),transparent 30%),linear-gradient(180deg,#060817,#101a30 60%,#06111e);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:42px 42px;opacity:.16;pointer-events:none}
.app{position:relative;z-index:1;min-height:100vh;padding:30px 16px 120px}
.hero{text-align:center;margin:0 auto 22px;max-width:760px}
.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:7px 14px;color:var(--gold);background:rgba(255,255,255,.06);font-size:13px}
h1{font-size:clamp(34px,7vw,66px);margin:16px 0 8px;letter-spacing:.04em}
.subtitle{margin:0;color:var(--muted);font-size:clamp(15px,3.7vw,20px);line-height:1.7}
.map{position:relative;width:min(1100px,100%);height:min(68vh,620px);min-height:460px;margin:26px auto 0;border:1px solid var(--line);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));box-shadow:0 26px 80px rgba(0,0,0,.38);overflow:hidden}
.map:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(142,234,255,.14),transparent 35%),radial-gradient(circle at 40% 78%,rgba(255,217,138,.1),transparent 35%)}
.land{position:absolute;inset:9%;opacity:.34;filter:drop-shadow(0 0 28px rgba(142,234,255,.25))}
.land svg{width:100%;height:100%}.land path{fill:rgba(255,248,236,.36)}
.city{position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);border:0;background:transparent;color:var(--text);cursor:pointer;padding:0;text-align:center}
.dot{width:16px;height:16px;margin:auto;border-radius:50%;background:var(--gold);box-shadow:0 0 0 8px rgba(255,217,138,.13),0 0 30px rgba(255,217,138,.9);animation:pulse 2.2s infinite}
.city-name{margin-top:9px;font-size:13px;white-space:nowrap;text-shadow:0 2px 10px rgba(0,0,0,.8)}
.city:hover .dot,.city.active .dot{transform:scale(1.35)}
@keyframes pulse{50%{box-shadow:0 0 0 18px rgba(255,217,138,0),0 0 42px rgba(255,217,138,1)}}
.tip{position:absolute;left:22px;bottom:22px;color:var(--muted);font-size:14px}
.drawer{position:fixed;z-index:10;left:50%;bottom:16px;transform:translate(-50%,120%);width:min(760px,calc(100% - 28px));max-height:76vh;overflow:auto;padding:22px;border:1px solid var(--line);border-radius:28px;background:rgba(13,17,34,.88);backdrop-filter:blur(18px);box-shadow:0 30px 90px rgba(0,0,0,.58);transition:.35s ease}
.drawer.show{transform:translate(-50%,0)}
.drawer-head{display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);padding-bottom:14px}
.drawer h2{margin:0;font-size:24px}.drawer p{margin:6px 0 0;color:var(--muted);line-height:1.6}
.close{width:36px;height:36px;border-radius:50%;border:0;background:rgba(255,255,255,.09);color:var(--text);font-size:20px;cursor:pointer}
.fans{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:16px}
.fan{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.06);padding:14px;text-align:left;color:var(--text);cursor:pointer}
.fan:hover{border-color:rgba(255,217,138,.55);background:rgba(255,217,138,.08)}
.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,217,138,.32),rgba(255,154,203,.22));margin-bottom:9px}
.letter{display:none;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}.letter.show{display:block}
.message{font-size:16px;line-height:1.9}.back{margin-top:12px;border:0;background:transparent;color:var(--cyan);cursor:pointer}
@media(max-width:640px){.map{height:64vh;border-radius:26px}.tip{font-size:12px;left:16px}.city-name{font-size:12px}}
</style>
</head>

<body>
<main class="app">
  <section class="hero">
    <div class="badge">2026 谜屿生日惊喜企划</div>
    <h1>来自世界的回响</h1>
    <p class="subtitle">每一座城市，都有一份想送给你的祝福。<br>点亮地图，慢慢打开家人们寄来的心意。</p>
  </section>

  <section class="map">
    <div class="land">
      <svg viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet">
        <path d="M140 190 C210 100,350 120,400 190 C455 270,360 350,245 330 C145 315,85 260,140 190Z"/>
        <path d="M430 150 C520 70,690 90,770 175 C850 260,790 390,635 405 C490 420,375 270,430 150Z"/>
        <path d="M625 315 C705 285,815 315,860 380 C805 440,690 450,615 405 C570 375,575 335,625 315Z"/>
      </svg>
    </div>
    <div id="cities"></div>
    <div class="tip">✨ 点击城市，开启祝福</div>
  </section>
</main>

<section class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <h2 id="drawerTitle"></h2>
      <p id="drawerDesc"></p>
    </div>
    <button class="close" onclick="closeDrawer()">×</button>
  </div>

  <div class="fans" id="fans"></div>

  <div class="letter" id="letter">
    <h3 id="fanName"></h3>
    <div class="message" id="fanMessage"></div>
    <button class="back" onclick="backToFans()">← 返回名单</button>
  </div>
</section>

<script>
let wishes = [];
let currentCity = null;

const citiesEl = document.getElementById("cities");
const drawer = document.getElementById("drawer");
const drawerTitle = document.getElementById("drawerTitle");
const drawerDesc = document.getElementById("drawerDesc");
const fansEl = document.getElementById("fans");
const letter = document.getElementById("letter");
const fanName = document.getElementById("fanName");
const fanMessage = document.getElementById("fanMessage");

fetch("./data/wishes.json")
  .then(res => res.json())
  .then(data => {
    wishes = data.cities || [];
    renderCities();
  })
  .catch(() => {
    document.querySelector(".tip").textContent = "资料载入失败，请检查 data/wishes.json";
  });

function renderCities(){
  citiesEl.innerHTML = "";
  wishes.forEach((city, index) => {
    const btn = document.createElement("button");
    btn.className = "city";
    btn.style.setProperty("--x", city.x);
    btn.style.setProperty("--y", city.y);
    btn.innerHTML = `
      <div class="dot"></div>
      <div class="city-name">${city.name}</div>
    `;
    btn.onclick = () => openCity(index);
    citiesEl.appendChild(btn);
  });
}

function openCity(index){
  currentCity = wishes[index];
  document.querySelectorAll(".city").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".city")[index].classList.add("active");

  drawerTitle.textContent = "📍 " + currentCity.name;
  drawerDesc.textContent = `来自 ${currentCity.name} 的 ${currentCity.fans.length} 份祝福`;
  fansEl.style.display = "grid";
  letter.classList.remove("show");
  fansEl.innerHTML = "";

  currentCity.fans.forEach((fan, i) => {
    const btn = document.createElement("button");
    btn.className = "fan";
    btn.innerHTML = `
      <div class="avatar">${fan.icon || "💌"}</div>
      <strong>${fan.name}</strong>
      <p>点击打开祝福</p>
    `;
    btn.onclick = () => openFan(i);
    fansEl.appendChild(btn);
  });

  drawer.classList.add("show");
}

function openFan(index){
  const fan = currentCity.fans[index];
  fansEl.style.display = "none";
  fanName.textContent = `${fan.icon || "💌"} ${fan.name}`;
  fanMessage.textContent = fan.message;
  letter.classList.add("show");
}

function backToFans(){
  letter.classList.remove("show");
  fansEl.style.display = "grid";
}

function closeDrawer(){
  drawer.classList.remove("show");
  document.querySelectorAll(".city").forEach(c => c.classList.remove("active"));
}
</script>
</body>
</html>
