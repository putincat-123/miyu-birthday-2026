<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>FM05.18｜来自各地的回响</title>
<style>
:root{--gold:#ffd98a;--pink:#ff7eac;--text:#fff8ec;--muted:rgba(255,248,236,.72);--line:rgba(255,255,255,.16);--paper:#f4e8d6;--paperText:#332315}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 18% 12%,rgba(255,126,172,.18),transparent 24%),radial-gradient(circle at 82% 18%,rgba(134,236,255,.14),transparent 28%),linear-gradient(180deg,#050713,#071024 45%,#060711);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.42;background-image:radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 1.5px),radial-gradient(circle,rgba(255,217,138,.65) 0 1px,transparent 1.6px);background-size:120px 120px,190px 190px;animation:stars 28s linear infinite}@keyframes stars{to{transform:translate(-70px,80px)}}
.app{position:relative;z-index:1;min-height:100vh;padding:22px;display:grid;grid-template-columns:minmax(520px,1fr) minmax(360px,480px) 172px;gap:18px}
.main{position:relative;min-height:calc(100vh - 44px);border-radius:34px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:rgba(5,8,18,.42)}
.main:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,7,18,.04),rgba(3,7,18,.2) 48%,rgba(3,7,18,.9)),radial-gradient(circle at 50% 78%,rgba(255,145,60,.45),transparent 8%)}
.header{position:absolute;left:0;right:0;top:0;z-index:4;text-align:center;padding:28px 20px 0}.kicker{color:var(--gold);letter-spacing:.24em;font-size:13px}.title{margin:4px 0 0;font-size:clamp(42px,5.4vw,82px);font-weight:900;color:#ffe8a8;text-shadow:0 0 18px rgba(255,217,138,.38)}.subtitle{font-size:clamp(26px,3.4vw,48px);font-weight:800;letter-spacing:.08em}.desc{margin:12px auto 0;color:rgba(255,248,236,.84);max-width:560px;line-height:1.8}
.moon{position:absolute;right:18%;top:10%;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff8da 0 18%,#ffe6a3 45%,#bb8b3e);box-shadow:0 0 28px rgba(255,217,138,.65),0 0 80px rgba(255,217,138,.28);z-index:2}
.string{position:absolute;left:4%;right:5%;top:9%;height:80px;border-top:2px solid rgba(255,217,138,.3);border-radius:50%;z-index:2}.string span{position:absolute;top:-6px;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 16px var(--gold)}.string span:nth-child(1){left:10%}.string span:nth-child(2){left:25%;top:5px}.string span:nth-child(3){left:42%;top:12px}.string span:nth-child(4){left:60%;top:11px}.string span:nth-child(5){left:80%;top:2px}
.tent{position:absolute;left:4%;bottom:10%;width:172px;height:184px;clip-path:polygon(50% 0,100% 100%,0 100%);background:linear-gradient(135deg,rgba(255,217,138,.15),rgba(255,160,80,.08));border:1px solid rgba(255,217,138,.28);filter:drop-shadow(0 0 26px rgba(255,217,138,.2));z-index:2}
.fire{position:absolute;left:50%;bottom:7%;width:150px;height:150px;transform:translateX(-50%);filter:drop-shadow(0 0 34px rgba(255,112,38,.7));z-index:3}.fire:before{content:"";position:absolute;left:50%;bottom:20px;width:82px;height:116px;transform:translateX(-50%);border-radius:48%;background:radial-gradient(circle at 50% 70%,#fff1a3 0 8%,#ffc35b 18%,#ff6f31 48%,transparent 70%);animation:flame 1.4s ease-in-out infinite}.fire:after{content:"";position:absolute;left:16px;right:16px;bottom:8px;height:20px;background:linear-gradient(90deg,#7a3e23,#c47a3f,#7a3e23);border-radius:20px}@keyframes flame{50%{transform:translateX(-50%) scale(.9,1.08) rotate(2deg)}}
.sea{position:absolute;left:0;right:0;bottom:0;height:35%;z-index:1;background:linear-gradient(180deg,rgba(12,33,58,.15),rgba(8,13,22,.84))}
.mapLayer{position:absolute;left:8%;right:8%;top:31%;height:46%;z-index:4}.mapShape{position:absolute;inset:0;opacity:.48;filter:drop-shadow(0 0 28px rgba(255,217,138,.18))}.mapShape svg{width:100%;height:100%}
.city{position:absolute;transform:translate(-50%,-50%);border-radius:999px;padding:8px 12px;color:#fff2d2;background:rgba(15,14,25,.78);border:1px solid rgba(255,217,138,.3);backdrop-filter:blur(10px);box-shadow:0 0 22px rgba(255,217,138,.12);font-size:14px;cursor:pointer;white-space:nowrap;transition:.2s}.city:before{content:"♥";color:var(--gold);margin-right:6px}.city.active{background:linear-gradient(90deg,rgba(255,126,172,.9),rgba(255,217,138,.35));box-shadow:0 0 28px rgba(255,126,172,.55);transform:translate(-50%,-50%) scale(1.08)}.city small{font-size:12px;color:rgba(255,248,236,.75);margin-left:4px}
.status{position:absolute;left:24px;bottom:22px;z-index:5;min-width:318px;border:1px solid var(--line);border-radius:22px;background:rgba(5,7,16,.72);backdrop-filter:blur(16px);padding:16px 18px;display:flex;align-items:center;gap:14px}.status .jar{font-size:34px}.status b{font-size:26px}.status span{display:block;color:var(--muted);font-size:13px;margin-top:3px}
.card{position:relative;min-height:calc(100vh - 44px);border:1px solid var(--line);border-radius:34px;background:rgba(8,10,22,.68);backdrop-filter:blur(18px);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.28)}
.cardTop{height:168px;background:radial-gradient(circle at 70% 40%,rgba(255,217,138,.22),transparent 30%),linear-gradient(135deg,rgba(255,126,172,.22),rgba(134,236,255,.12));position:relative;border-bottom:1px solid var(--line)}.cardTop:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(8,10,22,.65))}
.location{position:absolute;left:20px;top:18px;z-index:2;padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.16);color:#ffe9bd}.sender{position:absolute;left:22px;bottom:18px;z-index:2;display:flex;align-items:center;gap:12px}.avatar{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,217,138,.75);background:linear-gradient(135deg,#2a2847,#3b2648);display:grid;place-items:center;font-size:26px}.senderName{font-size:24px;font-weight:800}.badge{display:inline-flex;margin-left:8px;font-size:13px;padding:5px 9px;border-radius:999px;background:rgba(255,126,172,.25);color:#ffd9e6;border:1px solid rgba(255,126,172,.35)}
.letter{margin:18px;min-height:342px;border-radius:20px;background:var(--paper);color:var(--paperText);padding:28px;box-shadow:inset 0 0 0 1px rgba(78,45,23,.08),0 12px 40px rgba(0,0,0,.18);position:relative;overflow:auto}.letter:before{content:"“";position:absolute;left:18px;top:2px;font-size:78px;color:rgba(255,126,172,.3);font-family:Georgia,serif}.letterTitle{font-size:15px;color:#8c5f3c;margin-bottom:16px}.wish{white-space:pre-line;line-height:1.9;font-size:16px;position:relative;z-index:2}
.player{margin:0 18px 18px;border:1px solid rgba(255,255,255,.12);border-radius:20px;background:rgba(0,0,0,.28);padding:16px;display:flex;align-items:center;gap:14px}.play{width:58px;height:58px;border-radius:50%;border:0;background:linear-gradient(135deg,#ff7eac,#ffd98a);color:white;font-size:24px;cursor:pointer}.bars{flex:1;height:40px;display:flex;align-items:center;gap:4px;overflow:hidden}.bars i{display:block;width:3px;border-radius:4px;background:#ff8fb7;height:12px;opacity:.85;animation:bar 1.2s ease-in-out infinite;animation-play-state:paused}.bars.playing i{animation-play-state:running}@keyframes bar{50%{height:32px}}.audioType{font-size:13px;color:var(--muted);min-width:82px;text-align:right}
.actions{display:flex;gap:10px;margin:18px}.actions button{flex:1;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:var(--text);border-radius:16px;padding:13px 12px;font-weight:700;cursor:pointer}.actions button.primary{background:rgba(255,217,138,.16);border-color:rgba(255,217,138,.28);color:#ffe6a8}
.cityList{min-height:calc(100vh - 44px);border:1px solid var(--line);border-radius:26px;background:rgba(5,7,16,.62);backdrop-filter:blur(16px);padding:18px 14px;overflow:hidden}.cityList h3{margin:0 0 14px;color:#ffe8ad;font-size:18px}.rows{display:grid;gap:7px;max-height:calc(100vh - 150px);overflow:auto}.row{display:flex;justify-content:space-between;align-items:center;border:0;border-radius:14px;background:rgba(255,255,255,.06);color:var(--muted);padding:10px 12px;cursor:pointer}.row.active{background:rgba(255,126,172,.28);color:white}.count{background:rgba(255,217,138,.18);border-radius:999px;color:var(--gold);padding:2px 8px;font-size:12px}
@media(max-width:1100px){.app{grid-template-columns:1fr;gap:14px;padding:12px}.main{min-height:720px}.card,.cityList{min-height:auto}.cityList{order:2}}@media(max-width:650px){.title{font-size:42px}.subtitle{font-size:30px}.mapLayer{left:2%;right:2%;top:34%;height:40%}.city{font-size:12px;padding:7px 9px}.status{left:12px;right:12px;bottom:12px;min-width:0}.letter{margin:14px;padding:24px 18px;min-height:260px}.wish{font-size:15px}}
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <div class="string"><span></span><span></span><span></span><span></span><span></span></div><div class="moon"></div><div class="sea"></div><div class="tent"></div><div class="fire"></div>
    <header class="header"><div class="kicker">FM05.18</div><h1 class="title">来自各地的回响</h1><div class="subtitle">给谜屿的生日礼物</div><p class="desc">每一份祝福，都是一颗心的回响。点击城市，打开来自那里的生日祝福。</p></header>
    <section class="mapLayer"><div class="mapShape"><svg viewBox="0 0 720 420"><path d="M128,196 C145,110 240,80 318,96 C368,64 444,70 492,118 C570,116 626,164 612,230 C656,274 608,344 528,336 C476,384 370,374 332,330 C262,356 180,322 188,260 C144,250 116,232 128,196 Z" fill="rgba(255,217,138,.08)" stroke="rgba(255,217,138,.55)" stroke-width="2"/><path d="M255,160 C320,126 425,132 500,186 M210,240 C304,214 418,224 548,280 M300,300 C356,270 444,270 512,312" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="2" stroke-dasharray="8 10"/></svg></div><div id="cityDots"></div></section>
    <div class="status"><div class="jar">💌</div><div><b id="totalCount">0 / 0</b><span>已收集祝福｜点击城市查看</span></div></div>
  </main>
  <aside class="card"><div class="cardTop"><div class="location" id="region">📍 -</div><div class="sender"><div class="avatar" id="avatar">♡</div><div><span class="senderName" id="senderName">选择一个城市</span><span class="badge" id="voiceBadge">祝福</span></div></div></div><article class="letter"><div class="letterTitle">给谜屿的一封祝福</div><div class="wish" id="wishText">请点击地图上的城市，打开来自各地的生日祝福。</div></article><div class="player"><button class="play" id="playBtn">▶</button><div class="bars" id="bars"></div><div class="audioType" id="audioType">未播放</div></div><div class="actions"><button id="prevBtn">← 上一封</button><button class="primary" id="returnBtn">返回地图</button><button id="nextBtn">下一封 →</button></div></aside>
  <aside class="cityList"><h3>全部城市</h3><div class="rows" id="cityRows"></div></aside>
</div>
<script>
const cityPositions={"南京":{x:62,y:42},"台湾":{x:76,y:72},"海口":{x:52,y:83},"沈阳":{x:66,y:18},"深圳":{x:56,y:72},"曲靖":{x:41,y:67},"长沙":{x:54,y:58},"齐齐哈尔":{x:60,y:9},"延边":{x:72,y:17},"上海":{x:70,y:46},"张家界":{x:50,y:55},"湖州":{x:66,y:45}};
let blessings=[],filtered=[],currentIndex=0,audio=null,speaking=false;
const $=id=>document.getElementById(id);
async function loadData(){try{const res=await fetch("data/blessings.json?v="+Date.now());if(!res.ok)throw new Error("fetch failed");blessings=await res.json()}catch(e){blessings=[{id:"demo",name:"布丁",region:"台湾省",city:"台湾",wish:"亲爱的大哥，生日快乐呀。愿你新的一岁，被温柔和快乐包围。",audio:"",voiceType:"ai",avatar:""}]}filtered=blessings;renderAll();selectBlessing(0)}
function cityGroups(){const m={};blessings.forEach(item=>{const k=item.city||item.region||"其他";(m[k]||(m[k]=[])).push(item)});return m}
function renderAll(){$("totalCount").textContent=`${blessings.length} / ${blessings.length}`;renderCityDots();renderCityRows();renderBars()}
function renderCityDots(){const wrap=$("cityDots");wrap.innerHTML="";Object.entries(cityGroups()).forEach(([city,arr])=>{const pos=cityPositions[city]||{x:50,y:50};const btn=document.createElement("button");btn.className="city";btn.dataset.city=city;btn.style.left=pos.x+"%";btn.style.top=pos.y+"%";btn.innerHTML=`${city}<small>${arr.length}</small>`;btn.onclick=()=>{filtered=arr;selectBlessing(0);updateActiveCity(city)};wrap.appendChild(btn)})}
function renderCityRows(){const rows=$("cityRows");rows.innerHTML="";Object.entries(cityGroups()).sort((a,b)=>b[1].length-a[1].length).forEach(([city,arr])=>{const row=document.createElement("button");row.className="row";row.dataset.city=city;row.innerHTML=`<span>${city}</span><span class="count">${arr.length}</span>`;row.onclick=()=>{filtered=arr;selectBlessing(0);updateActiveCity(city)};rows.appendChild(row)})}
function updateActiveCity(city){document.querySelectorAll(".city,.row").forEach(el=>el.classList.toggle("active",el.dataset.city===city))}
function selectBlessing(index){if(!filtered.length)return;currentIndex=(index+filtered.length)%filtered.length;const item=filtered[currentIndex];$("region").textContent="📍 "+(item.region||item.city||"来自远方");$("senderName").textContent=item.name||"一位家人";$("wishText").textContent=item.wish||"";$("avatar").textContent=item.avatar?"":"♡";if(item.avatar){$("avatar").style.backgroundImage=`url(${item.avatar})`;$("avatar").style.backgroundSize="cover";$("avatar").style.backgroundPosition="center"}else{$("avatar").style.backgroundImage=""}const isReal=item.voiceType==="real"&&item.audio;$("voiceBadge").textContent=isReal?"真人录音":"AI代念";$("audioType").textContent=isReal?"粉丝录音":"AI代念";updateActiveCity(item.city);stopAll()}
function renderBars(){const bars=$("bars");bars.innerHTML="";for(let i=0;i<52;i++){const b=document.createElement("i");b.style.animationDelay=(i*.035)+"s";b.style.height=(10+Math.sin(i*.8)*12+(i%5)*2)+"px";bars.appendChild(b)}}
function stopAll(){if(audio){audio.pause();audio.currentTime=0;audio=null}if(window.speechSynthesis)window.speechSynthesis.cancel();speaking=false;$("bars").classList.remove("playing");$("playBtn").textContent="▶"}
function playCurrent(){const item=filtered[currentIndex];if(!item)return;stopAll();const isReal=item.voiceType==="real"&&item.audio;$("bars").classList.add("playing");$("playBtn").textContent="Ⅱ";if(isReal){audio=new Audio(item.audio);audio.onended=stopAll;audio.onerror=()=>speakWish(item);audio.play().catch(()=>speakWish(item))}else{speakWish(item)}}
function speakWish(item){if(!("speechSynthesis" in window)){alert("此浏览器不支持文字转语音，请直接阅读祝福。");stopAll();return}const intro=`接下来，是来自${item.region||item.city||"远方"}，${item.name||"一位家人"}的一封祝福。`;const utter=new SpeechSynthesisUtterance(intro+" "+item.wish);utter.lang="zh-CN";utter.rate=.88;utter.pitch=.95;utter.onend=stopAll;utter.onerror=stopAll;speaking=true;window.speechSynthesis.speak(utter)}
$("playBtn").onclick=()=>{if(speaking||audio)stopAll();else playCurrent()};$("prevBtn").onclick=()=>selectBlessing(currentIndex-1);$("nextBtn").onclick=()=>selectBlessing(currentIndex+1);$("returnBtn").onclick=()=>{filtered=blessings;selectBlessing(0)};loadData();
</script>
</body>
</html>
