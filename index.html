<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>FM05.18｜来自各地的回响</title>
<style>
:root{--text:#fff8ec;--muted:rgba(255,248,236,.72);--gold:#ffd98a;--pink:#ff7eac;--line:rgba(255,255,255,.16);--paper:#f6e9d5;--paperText:#342212}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 18% 12%,rgba(255,126,172,.18),transparent 24%),radial-gradient(circle at 82% 18%,rgba(134,236,255,.14),transparent 28%),linear-gradient(180deg,#050713,#071024 45%,#060711);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.42;background-image:radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 1.5px),radial-gradient(circle,rgba(255,217,138,.65) 0 1px,transparent 1.6px);background-size:120px 120px,190px 190px;animation:stars 28s linear infinite}@keyframes stars{to{transform:translate(-70px,80px)}}
.app{position:relative;z-index:1;min-height:100vh;padding:22px;display:grid;grid-template-columns:minmax(540px,1fr) minmax(360px,500px);gap:18px}
.stage{position:relative;min-height:calc(100vh - 44px);border-radius:34px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:rgba(5,8,18,.42);box-shadow:0 24px 80px rgba(0,0,0,.24)}
.stage:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,7,18,.03),rgba(3,7,18,.2) 48%,rgba(3,7,18,.9)),radial-gradient(circle at 50% 80%,rgba(255,145,60,.45),transparent 8%),radial-gradient(circle at 13% 82%,rgba(255,217,138,.16),transparent 10%)}
.header{position:absolute;left:0;right:0;top:0;z-index:5;text-align:center;padding:28px 18px 0}.kicker{color:var(--gold);letter-spacing:.28em;font-size:13px}.title{margin:4px 0 0;font-size:clamp(42px,5.2vw,82px);font-weight:900;color:#ffe8a8;text-shadow:0 0 18px rgba(255,217,138,.38)}.subtitle{font-size:clamp(25px,3.2vw,46px);font-weight:800;letter-spacing:.08em}.desc{margin:12px auto 0;color:rgba(255,248,236,.84);max-width:560px;line-height:1.8}
.moon{position:absolute;right:18%;top:10%;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff8da 0 18%,#ffe6a3 45%,#bb8b3e);box-shadow:0 0 28px rgba(255,217,138,.65),0 0 80px rgba(255,217,138,.28);z-index:2}
.string{position:absolute;left:4%;right:5%;top:9%;height:80px;border-top:2px solid rgba(255,217,138,.3);border-radius:50%;z-index:2}.string span{position:absolute;top:-6px;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 16px var(--gold)}.string span:nth-child(1){left:10%}.string span:nth-child(2){left:25%;top:5px}.string span:nth-child(3){left:42%;top:12px}.string span:nth-child(4){left:60%;top:11px}.string span:nth-child(5){left:80%;top:2px}
.tent{position:absolute;left:4%;bottom:10%;width:172px;height:184px;clip-path:polygon(50% 0,100% 100%,0 100%);background:linear-gradient(135deg,rgba(255,217,138,.15),rgba(255,160,80,.08));border:1px solid rgba(255,217,138,.28);filter:drop-shadow(0 0 26px rgba(255,217,138,.2));z-index:2}
.fire{position:absolute;left:50%;bottom:7%;width:150px;height:150px;transform:translateX(-50%);filter:drop-shadow(0 0 34px rgba(255,112,38,.7));z-index:3}.fire:before{content:"";position:absolute;left:50%;bottom:20px;width:82px;height:116px;transform:translateX(-50%);border-radius:48%;background:radial-gradient(circle at 50% 70%,#fff1a3 0 8%,#ffc35b 18%,#ff6f31 48%,transparent 70%);animation:flame 1.4s ease-in-out infinite}.fire:after{content:"";position:absolute;left:16px;right:16px;bottom:8px;height:20px;background:linear-gradient(90deg,#7a3e23,#c47a3f,#7a3e23);border-radius:20px}@keyframes flame{50%{transform:translateX(-50%) scale(.9,1.08) rotate(2deg)}}
.sea{position:absolute;left:0;right:0;bottom:0;height:35%;z-index:1;background:linear-gradient(180deg,rgba(12,33,58,.15),rgba(8,13,22,.84))}
.mapLayer{position:absolute;left:8%;right:8%;top:31%;height:46%;z-index:4}.mapShape{position:absolute;inset:0;opacity:.48;filter:drop-shadow(0 0 28px rgba(255,217,138,.18))}.mapShape svg{width:100%;height:100%}
.city{position:absolute;transform:translate(-50%,-50%);border-radius:999px;padding:8px 12px;color:#fff2d2;background:rgba(15,14,25,.78);border:1px solid rgba(255,217,138,.3);backdrop-filter:blur(10px);box-shadow:0 0 22px rgba(255,217,138,.12);font-size:14px;cursor:pointer;white-space:nowrap;transition:.22s}.city:before{content:"✦";color:var(--gold);margin-right:6px}.city:hover,.city.active{background:linear-gradient(90deg,rgba(255,126,172,.88),rgba(255,217,138,.32));box-shadow:0 0 30px rgba(255,126,172,.5);transform:translate(-50%,-50%) scale(1.08)}.city.done:before{content:"🌟"}.city small{font-size:12px;color:rgba(255,248,236,.78);margin-left:4px}
.status{position:absolute;left:24px;bottom:22px;z-index:5;min-width:318px;border:1px solid var(--line);border-radius:22px;background:rgba(5,7,16,.72);backdrop-filter:blur(16px);padding:16px 18px;display:flex;align-items:center;gap:14px}.status .jar{font-size:34px}.status b{font-size:26px}.status span{display:block;color:var(--muted);font-size:13px;margin-top:3px}
.panel{position:relative;min-height:calc(100vh - 44px);border:1px solid var(--line);border-radius:34px;background:rgba(8,10,22,.72);backdrop-filter:blur(18px);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.28)}.panelTop{height:148px;background:radial-gradient(circle at 70% 40%,rgba(255,217,138,.22),transparent 30%),linear-gradient(135deg,rgba(255,126,172,.22),rgba(134,236,255,.12));position:relative;border-bottom:1px solid var(--line)}.panelTop:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(8,10,22,.65))}.panelTitle{position:absolute;left:22px;bottom:20px;z-index:2}.panelTitle .small{color:var(--gold);font-size:13px;letter-spacing:.14em;margin-bottom:6px}.panelTitle h2{margin:0;font-size:28px}.panelBody{padding:18px;min-height:calc(100vh - 192px)}
.empty{height:calc(100vh - 228px);min-height:480px;display:grid;place-items:center;text-align:center;border:1px dashed rgba(255,217,138,.24);border-radius:26px;background:rgba(255,255,255,.04)}.env{width:172px;height:112px;margin:0 auto 24px;position:relative;border-radius:16px;background:linear-gradient(135deg,#f5e7c9,#d6a969);box-shadow:0 18px 60px rgba(0,0,0,.28)}.env:before{content:"";position:absolute;inset:0;clip-path:polygon(0 0,50% 56%,100% 0,100% 100%,0 100%);background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(122,73,30,.2));border-radius:16px}.empty h3{margin:0 0 10px;font-size:28px;color:#ffe6ad}.empty p{margin:0;color:var(--muted);line-height:1.8}
.mailbox,.letterView{display:none}.mailbox.show,.letterView.show{display:block;animation:fade .24s ease both}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.cityHeader{padding:16px 18px;border-radius:20px;border:1px solid rgba(255,217,138,.18);background:rgba(255,255,255,.055);margin-bottom:14px}.cityHeader b{font-size:22px;color:#ffe6ad}.cityHeader span{display:block;color:var(--muted);margin-top:4px}.mailList{display:grid;gap:10px;max-height:calc(100vh - 312px);overflow:auto;padding-right:4px}.mailItem{border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.06);color:var(--text);padding:14px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left}.mailItem:hover{background:rgba(255,217,138,.12)}.mailIcon{font-size:28px}.mailMeta{flex:1}.mailName{font-weight:800;font-size:17px}.mailHint{color:var(--muted);font-size:13px;margin-top:3px}
.letterShell{border-radius:24px;background:var(--paper);color:var(--paperText);box-shadow:0 18px 60px rgba(0,0,0,.28);overflow:hidden}.letterView.opening .letterShell{animation:openLetter .48s ease both}@keyframes openLetter{from{opacity:.4;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}.letterHead{padding:18px 22px;background:linear-gradient(135deg,#ffe8bd,#efd1a5);border-bottom:1px solid rgba(90,55,20,.12)}.letterHead .region{color:#7b5633;font-size:14px;margin-bottom:5px}.letterHead .name{font-size:28px;font-weight:900;color:#36210e}.letterContent{position:relative;padding:26px 24px 24px;min-height:310px;max-height:calc(100vh - 440px);overflow:auto}.letterContent:before{content:"“";position:absolute;left:14px;top:-6px;font-size:86px;color:rgba(255,126,172,.25);font-family:Georgia,serif}.wish{position:relative;z-index:2;white-space:pre-line;line-height:1.95;font-size:16px}
.player{margin-top:14px;border:1px solid rgba(255,255,255,.12);border-radius:20px;background:rgba(0,0,0,.24);padding:14px;display:flex;align-items:center;gap:13px}.play{min-width:138px;height:52px;border-radius:999px;border:0;background:linear-gradient(135deg,#ff7eac,#ffd98a);color:white;font-size:16px;font-weight:900;cursor:pointer}.bars{flex:1;height:40px;display:flex;align-items:center;gap:4px;overflow:hidden}.bars i{display:block;width:3px;border-radius:4px;background:#ff8fb7;height:12px;opacity:.85;animation:bar 1.2s ease-in-out infinite;animation-play-state:paused}.bars.playing i{animation-play-state:running}@keyframes bar{50%{height:32px}}.controls{display:flex;gap:10px;margin-top:14px}.controls button{flex:1;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:var(--text);border-radius:16px;padding:13px 12px;font-weight:800;cursor:pointer}.controls .primary{background:rgba(255,217,138,.16);border-color:rgba(255,217,138,.28);color:#ffe6a8}.doneBadge{display:none;margin-top:10px;color:#d3ffc6;font-weight:800}.doneBadge.show{display:block}
.final{display:none;position:absolute;inset:0;z-index:20;background:radial-gradient(circle at center,rgba(255,217,138,.18),transparent 36%),rgba(5,7,16,.94);place-items:center;text-align:center;padding:30px}.final.show{display:grid;animation:fade .5s ease both}.final h2{font-size:clamp(38px,6vw,72px);margin:0 0 12px;color:#ffe8ad}.final p{color:var(--muted);line-height:1.9;font-size:18px;margin:0}.final .fm{margin-top:24px;color:var(--gold);letter-spacing:.24em}
@media(max-width:1020px){.app{grid-template-columns:1fr;padding:12px}.stage{min-height:700px}.panel{min-height:auto}.panelBody{min-height:auto}.empty{min-height:420px;height:auto}}@media(max-width:640px){.title{font-size:38px}.subtitle{font-size:27px}.desc{font-size:14px}.mapLayer{left:2%;right:2%;top:36%;height:38%}.city{font-size:12px;padding:7px 9px}.status{left:12px;right:12px;bottom:12px;min-width:0}.mailList{max-height:none}.letterContent{max-height:none;min-height:260px}.play{min-width:118px}}
</style>
</head>
<body>
<div class="app">
<main class="stage"><div class="string"><span></span><span></span><span></span><span></span><span></span></div><div class="moon"></div><div class="sea"></div><div class="tent"></div><div class="fire"></div><header class="header"><div class="kicker">FM05.18</div><h1 class="title">来自各地的回响</h1><div class="subtitle">给谜屿的生日礼物</div><p class="desc">点击地图上的城市，打开一封来自远方的生日信。</p></header><section class="mapLayer"><div class="mapShape"><svg viewBox="0 0 720 420"><path d="M128,196 C145,110 240,80 318,96 C368,64 444,70 492,118 C570,116 626,164 612,230 C656,274 608,344 528,336 C476,384 370,374 332,330 C262,356 180,322 188,260 C144,250 116,232 128,196 Z" fill="rgba(255,217,138,.08)" stroke="rgba(255,217,138,.55)" stroke-width="2"/><path d="M255,160 C320,126 425,132 500,186 M210,240 C304,214 418,224 548,280 M300,300 C356,270 444,270 512,312" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="2" stroke-dasharray="8 10"/></svg></div><div id="cityDots"></div></section><div class="status"><div class="jar">💌</div><div><b id="readCount">0 / 0</b><span>已拆阅生日信｜点亮所有城市</span></div></div><div class="final" id="final"><div><h2>谜屿，生日快乐</h2><p>来自各地的祝福，都已经抵达。<br>谢谢你，让天南地北的人，因为歌声而相遇。</p><div class="fm">FM05.18</div></div></div></main>
<aside class="panel"><div class="panelTop"><div class="panelTitle"><div class="small">ECHO LETTERS</div><h2 id="panelTitle">未拆的生日信</h2></div></div><div class="panelBody"><section class="empty" id="emptyState"><div><div class="env"></div><h3>来自各地的回响</h3><p>点击地图上的城市，<br>打开一封来自远方的生日信。</p></div></section><section class="mailbox" id="mailbox"><div class="cityHeader"><b id="mailboxCity">城市</b><span id="mailboxCount">收到 0 封生日信</span></div><div class="mailList" id="mailList"></div></section><section class="letterView" id="letterView"><div class="letterShell"><div class="letterHead"><div class="region" id="letterRegion">📍 -</div><div class="name" id="letterName">-</div></div><div class="letterContent"><div class="wish" id="letterWish"></div></div></div><div class="player"><button class="play" id="playBtn">▶ 播放祝福</button><div class="bars" id="bars"></div></div><div class="doneBadge" id="doneBadge">📬 这封信已经拆阅</div><div class="controls"><button id="backBtn">← 返回信箱</button><button class="primary" id="replayBtn">重播祝福</button></div></section></div></aside>
</div>
<script>
const cityPositions={"南京":{x:62,y:42},"台湾":{x:76,y:72},"海口":{x:52,y:83},"沈阳":{x:66,y:18},"深圳":{x:56,y:72},"曲靖":{x:41,y:67},"长沙":{x:54,y:58},"齐齐哈尔":{x:60,y:9},"延边":{x:72,y:17},"上海":{x:70,y:46},"张家界":{x:50,y:55},"湖州":{x:66,y:45}};
let blessings=[],currentCity="",currentItem=null,opened=new Set(JSON.parse(localStorage.getItem("fm0518-opened")||"[]")),audio=null;const $=id=>document.getElementById(id);
async function loadData(){try{const r=await fetch("data/blessings.json?v="+Date.now());if(!r.ok)throw new Error();blessings=await r.json()}catch(e){blessings=[{id:"demo",name:"一位家人",region:"远方",city:"远方",wish:"祝谜屿生日快乐。",audio:"audio/demo.m4a"}]}renderBars();renderCities();updateReadCount()}
function groupByCity(){const m={};blessings.forEach(x=>{const c=x.city||x.region||"其他";(m[c]||(m[c]=[])).push(x)});return m}
function renderCities(){const wrap=$("cityDots");wrap.innerHTML="";Object.entries(groupByCity()).forEach(([city,list])=>{const pos=cityPositions[city]||{x:50,y:50};const b=document.createElement("button");b.className="city";b.dataset.city=city;b.style.left=pos.x+"%";b.style.top=pos.y+"%";b.innerHTML=`${city}<small>${list.length}</small>`;b.onclick=()=>openMailbox(city);if(list.every(x=>opened.has(x.id)))b.classList.add("done");wrap.appendChild(b)})}
function setMode(m){$("emptyState").style.display=m==="empty"?"grid":"none";$("mailbox").classList.toggle("show",m==="mailbox");$("letterView").classList.toggle("show",m==="letter")}
function openMailbox(city){stopAudio();currentCity=city;currentItem=null;setMode("mailbox");$("panelTitle").textContent="来自"+city+"的生日信";const list=groupByCity()[city]||[];$("mailboxCity").textContent="📍 "+city;$("mailboxCount").textContent=`收到 ${list.length} 封生日信，选择一封慢慢打开。`;const box=$("mailList");box.innerHTML="";list.forEach(item=>{const btn=document.createElement("button");btn.className="mailItem";btn.innerHTML=`<div class="mailIcon">${opened.has(item.id)?"📬":"💌"}</div><div class="mailMeta"><div class="mailName">${item.name||"一位家人"}</div><div class="mailHint">${opened.has(item.id)?"已拆阅":"点击拆开这封信"}</div></div>`;btn.onclick=()=>openLetter(item);box.appendChild(btn)});document.querySelectorAll(".city").forEach(el=>el.classList.toggle("active",el.dataset.city===city))}
function openLetter(item){stopAudio();currentItem=item;setMode("letter");$("panelTitle").textContent="正在拆阅生日信";$("letterRegion").textContent="📍 "+(item.region||item.city||"来自远方");$("letterName").textContent=item.name||"一位家人";$("letterWish").textContent=item.wish||"";$("letterView").classList.remove("opening");void $("letterView").offsetWidth;$("letterView").classList.add("opening");$("doneBadge").classList.toggle("show",opened.has(item.id))}
function renderBars(){const bars=$("bars");bars.innerHTML="";for(let i=0;i<52;i++){const b=document.createElement("i");b.style.animationDelay=(i*.035)+"s";b.style.height=(10+Math.sin(i*.8)*12+(i%5)*2)+"px";bars.appendChild(b)}}
function stopAudio(){if(audio){audio.pause();audio.currentTime=0;audio=null}$("bars").classList.remove("playing");$("playBtn").textContent="▶ 播放祝福"}
function markOpened(item){opened.add(item.id);localStorage.setItem("fm0518-opened",JSON.stringify([...opened]));$("doneBadge").classList.add("show");updateReadCount();renderCities();if(blessings.length&&blessings.every(x=>opened.has(x.id))){$("final").classList.add("show");setTimeout(()=>$("final").classList.remove("show"),6500)}}
function updateReadCount(){$("readCount").textContent=`${opened.size} / ${blessings.length}`}
function playCurrent(){if(!currentItem)return;stopAudio();if(!currentItem.audio){alert("这封祝福还没有音频。");return}audio=new Audio(currentItem.audio);$("bars").classList.add("playing");$("playBtn").textContent="Ⅱ 暂停";audio.onended=()=>{markOpened(currentItem);stopAudio()};audio.onerror=()=>{alert("找不到音频："+currentItem.audio);stopAudio()};audio.play().catch(()=>{alert("音频无法播放，请检查文件格式或浏览器权限。");stopAudio()})}
$("playBtn").onclick=()=>{if(audio)stopAudio();else playCurrent()};$("replayBtn").onclick=playCurrent;$("backBtn").onclick=()=>{stopAudio();if(currentCity)openMailbox(currentCity);else setMode("empty")};loadData();
</script>
</body>
</html>
