<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>谜屿生日礼物｜来自世界的回响</title>
<style>
:root{--bg:#060817;--text:#fff8ec;--muted:rgba(255,248,236,.7);--gold:#ffd98a;--cyan:#8eeaff;--pink:#ff9acb;--line:rgba(255,255,255,.16)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:#060817;overflow-x:hidden}body{background:radial-gradient(circle at 18% 10%,rgba(255,154,203,.24),transparent 30%),radial-gradient(circle at 84% 18%,rgba(142,234,255,.18),transparent 32%),linear-gradient(180deg,#060817,#101a30 58%,#06111e)}body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:42px 42px;opacity:.16;pointer-events:none}.app{position:relative;z-index:1;min-height:100vh;padding:30px 16px 120px}.hero{text-align:center;margin:0 auto 22px;max-width:780px}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:7px 14px;color:var(--gold);background:rgba(255,255,255,.06);font-size:13px}h1{font-size:clamp(34px,7vw,66px);margin:16px 0 8px;letter-spacing:.04em}.subtitle{margin:0;color:var(--muted);font-size:clamp(15px,3.7vw,20px);line-height:1.7}.stats{margin-top:14px;color:var(--gold);font-size:14px}.map{position:relative;width:min(1120px,100%);height:min(68vh,630px);min-height:470px;margin:24px auto 0;border:1px solid var(--line);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));box-shadow:0 26px 80px rgba(0,0,0,.38);overflow:hidden}.map:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(142,234,255,.14),transparent 35%),radial-gradient(circle at 40% 78%,rgba(255,217,138,.1),transparent 35%)}.land{position:absolute;inset:9%;opacity:.35;filter:drop-shadow(0 0 28px rgba(142,234,255,.24))}.land svg{width:100%;height:100%}.land path{fill:rgba(255,248,236,.36)}.city{position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);border:0;background:transparent;color:var(--text);cursor:pointer;padding:0;text-align:center}.dot{width:16px;height:16px;margin:auto;border-radius:50%;background:var(--gold);box-shadow:0 0 0 8px rgba(255,217,138,.13),0 0 30px rgba(255,217,138,.9);animation:pulse 2.2s infinite}.city-name{margin-top:9px;font-size:13px;white-space:nowrap;text-shadow:0 2px 10px rgba(0,0,0,.85)}.city small{display:block;color:var(--muted);font-size:11px}.city:hover .dot,.city.active .dot{transform:scale(1.36)}.city.collected .dot{background:#fff;box-shadow:0 0 0 8px rgba(142,234,255,.12),0 0 34px rgba(142,234,255,.9)}.city.collected .city-name:before{content:"⭐ "}@keyframes pulse{50%{box-shadow:0 0 0 18px rgba(255,217,138,0),0 0 42px rgba(255,217,138,1)}}.tip{position:absolute;left:22px;bottom:22px;color:var(--muted);font-size:14px}.drawer{position:fixed;z-index:10;left:50%;bottom:16px;transform:translate(-50%,120%);width:min(780px,calc(100% - 28px));max-height:76vh;overflow:auto;padding:22px;border:1px solid var(--line);border-radius:28px;background:rgba(13,17,34,.9);backdrop-filter:blur(18px);box-shadow:0 30px 90px rgba(0,0,0,.58);transition:.35s ease}.drawer.show{transform:translate(-50%,0)}.drawer-head{display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);padding-bottom:14px}.drawer h2{margin:0;font-size:24px}.drawer p{margin:6px 0 0;color:var(--muted);line-height:1.6}.close{width:36px;height:36px;border-radius:50%;border:0;background:rgba(255,255,255,.09);color:var(--text);font-size:20px;cursor:pointer}.fans{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-top:16px}.fan{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.06);padding:14px;text-align:left;color:var(--text);cursor:pointer}.fan:hover{border-color:rgba(255,217,138,.55);background:rgba(255,217,138,.08)}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,217,138,.32),rgba(255,154,203,.22));margin-bottom:9px}.letter{display:none;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}.letter.show{display:block}.message{font-size:16px;line-height:1.95;white-space:pre-wrap}.back{margin-top:14px;border:0;background:transparent;color:var(--cyan);cursor:pointer}.ending{display:none;text-align:center;padding:18px;border-top:1px solid var(--line);margin-top:14px;color:var(--gold);line-height:1.8}.ending.show{display:block}@media(max-width:640px){.app{padding:22px 12px 115px}.map{height:64vh;min-height:500px;border-radius:26px}.tip{font-size:12px;left:16px}.city-name{font-size:12px}.city small{font-size:10px}.drawer{padding:18px}}
</style>
</head>
<body>
<main class="app">
  <section class="hero">
    <div class="badge">2026 谜屿生日惊喜企划</div>
    <h1>来自世界的回响</h1>
    <p class="subtitle">每一座城市，都有一份想送给你的生日祝福。<br>点亮地图，慢慢打开家人们寄来的心意。</p>
    <div class="stats" id="stats">祝福载入中...</div>
  </section>
  <section class="map">
    <div class="land"><svg viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet"><path d="M515 65 C585 58,670 88,715 145 C750 190,735 238,775 282 C815 327,785 391,720 416 C652 442,605 404,558 438 C505 475,420 455,375 410 C330 365,352 315,304 292 C252 267,268 204,330 180 C392 155,405 112,515 65Z"/><path d="M705 410 C748 398,812 422,842 456 C803 490,736 494,696 466 C675 450,678 424,705 410Z"/></svg></div>
    <div id="cities"></div><div class="tip">✨ 点击城市，开启祝福；读过的城市会变成星星</div>
  </section>
</main>
<section class="drawer" id="drawer"><div class="drawer-head"><div><h2 id="drawerTitle"></h2><p id="drawerDesc"></p></div><button class="close" onclick="closeDrawer()">×</button></div><div class="fans" id="fans"></div><div class="letter" id="letter"><h3 id="fanName"></h3><div class="message" id="fanMessage"></div><button class="back" onclick="backToFans()">← 返回名单</button></div><div class="ending" id="ending">谢谢每一位家人。<br>因为你们，这个夏夜变得更加温暖。<br><strong>生日快乐，谜屿。</strong></div></section>
<script>
let wishes=[],currentCity=null,collected=new Set();
const $=id=>document.getElementById(id),citiesEl=$("cities"),drawer=$("drawer"),drawerTitle=$("drawerTitle"),drawerDesc=$("drawerDesc"),fansEl=$("fans"),letter=$("letter"),fanName=$("fanName"),fanMessage=$("fanMessage"),stats=$("stats"),ending=$("ending");
fetch("./data/wishes.json").then(r=>r.json()).then(d=>{wishes=d.cities||[];renderCities();updateStats();}).catch(()=>{stats.textContent="资料载入失败，请检查 data/wishes.json"});
function totalFans(){return wishes.reduce((s,c)=>s+c.fans.length,0)}
function updateStats(){stats.textContent=`来自 ${wishes.length} 个地方，${totalFans()} 份生日祝福`}
function renderCities(){citiesEl.innerHTML="";wishes.forEach((city,i)=>{const btn=document.createElement("button");btn.className="city";btn.style.setProperty("--x",city.x);btn.style.setProperty("--y",city.y);btn.innerHTML=`<div class="dot"></div><div class="city-name">${city.name}<small>${city.fans.length} 份祝福</small></div>`;btn.onclick=()=>openCity(i);citiesEl.appendChild(btn)})}
function openCity(i){currentCity=wishes[i];collected.add(currentCity.name);document.querySelectorAll(".city").forEach((c,idx)=>{c.classList.toggle("active",idx===i);if(collected.has(wishes[idx].name))c.classList.add("collected")});drawerTitle.textContent="📍 "+currentCity.name;drawerDesc.textContent=`来自 ${currentCity.name} 的 ${currentCity.fans.length} 份祝福`;fansEl.style.display="grid";letter.classList.remove("show");ending.classList.toggle("show",collected.size===wishes.length);fansEl.innerHTML="";currentCity.fans.forEach((fan,idx)=>{const b=document.createElement("button");b.className="fan";b.innerHTML=`<div class="avatar">${fan.icon||"💌"}</div><strong>${fan.name}</strong><p>点击打开祝福</p>`;b.onclick=()=>openFan(idx);fansEl.appendChild(b)});drawer.classList.add("show")}
function openFan(i){const fan=currentCity.fans[i];fansEl.style.display="none";fanName.textContent=`${fan.icon||"💌"} ${fan.name}`;fanMessage.textContent=fan.message;letter.classList.add("show")}
function backToFans(){letter.classList.remove("show");fansEl.style.display="grid"}
function closeDrawer(){drawer.classList.remove("show");document.querySelectorAll(".city").forEach(c=>c.classList.remove("active"))}
</script>
</body>
</html>
